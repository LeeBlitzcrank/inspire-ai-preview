server:
  port: 8081

spring:
  application:
    name: inspire-auth
  profiles:
    active: dev

  # SQL 初始化（首次启动自动建表）
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

mybatis-plus:
  global-config:
    db-config:
      id-type: none       # 雪花ID由代码生成
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

inspire:
  jwt:
    # 与网关相同的密钥，确保颁发的 Token 可以被网关校验
    secret: dGhpc0lzQURlZmF1bHRTZWNyZXRLZXlGb3JMb2NhbERldk9ubHlQbGVhc2VSZXBsYWNlSW5Qcm9k
    expiration: 604800000

logging:
  level:
    com.inspire: debug
    com.baomidou.mybatisplus: info
