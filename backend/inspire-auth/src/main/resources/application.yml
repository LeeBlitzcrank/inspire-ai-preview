server:
  port: 8081

spring:
  application:
    name: inspire-auth
  profiles:
    active: dev
  data:
    redis:
      host: ${INSPIRE_REDIS_HOST:localhost}
      port: ${INSPIRE_REDIS_PORT:6379}
      password: ${INSPIRE_REDIS_PASSWORD:123456}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # SQL 初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true

  # 邮件配置（找回密码用）
  mail:
    host: smtp.qq.com
    port: 587
    username: 45257209@qq.com
    password: ${INSPIRE_AUTH_DB_PASSWORD:csqrlhvdxuewbghe}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

mybatis-plus:
  global-config:
    db-config:
      id-type: input
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

inspire:
  jwt:
    # JWT密钥：通过环境变量INSPIRE_JWT_SECRET注入（文档5.1节），开发环境有默认值
    secret: ${INSPIRE_JWT_SECRET:dGhpc0lzQURlZmF1bHRTZWNyZXRLZXlGb3JMb2NhbERldk9ubHlQbGVhc2VSZXBsYWNlSW5Qcm9k}
    # AccessToken 有效期（文档4.1.2节）：15分钟 = 900秒
    access-token-expiration: 900000
  session:
    # RefreshToken 有效期（文档4.1.2节）：7天
    refresh-token-expiration: 604800000
  app:
    frontend-url: http://localhost:5173

logging:
  level:
    com.inspire: debug
    com.baomidou.mybatisplus: info

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
