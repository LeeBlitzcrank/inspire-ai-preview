spring:
  datasource:
    url: jdbc:mysql://localhost:3306/inspire_ai_preview?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectionTimeZone=%2B08:00&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: ${INSPIRE_AUTH_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 5000

  data:
    redis:
      host: ${INSPIRE_REDIS_HOST:localhost}
      port: ${INSPIRE_REDIS_PORT:6379}
      password: ${INSPIRE_REDIS_PASSWORD:123456}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

logging:
  level:
    com.inspire: debug
  pattern:
    dateformat: yyyy-MM-dd'T'HH:mm:ss.SSS Asia/Shanghai
