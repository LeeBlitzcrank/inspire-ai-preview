# =============================================
# 开发环境配置 - 本地 Docker 中间件
# =============================================

server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: '123456'          # 本地 Docker Redis 无密码请留空
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  # 本地 MySQL（开发阶段网关不直连数据库，仅用于校验连接配置）
  datasource:
    url: jdbc:mysql://localhost:3306/inspire_space?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# 路由指向本地开发服务
routes:
  auth-service: http://localhost:8081
  ai-service: http://localhost:8082
  core-service: http://localhost:8083
  recommend-service: http://localhost:8084
  admin-service: http://localhost:8085

# 开发环境日志级别
logging:
  level:
    com.inspire: debug
    org.springframework.cloud.gateway: info
    org.springframework.data.redis: debug
