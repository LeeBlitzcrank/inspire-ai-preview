server:
  port: 8080

spring:
  application:
    name: inspire-gateway
  profiles:
    active: dev
  main:
    web-application-type: reactive
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userKeyResolver}"
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            redis-rate-limiter.requestedTokens: 1
      routes:
        - id: inspire-auth
          uri: ${routes.auth-service:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: inspire-ai
          uri: ${routes.ai-service:http://localhost:8082}
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
        - id: inspire-core
          uri: ${routes.core-service:http://localhost:8083}
          predicates:
            - Path=/api/inspire/**
          filters:
            - StripPrefix=1
        # 静态文件（上传的图片）
        - id: inspire-uploads
          uri: ${routes.core-service:http://localhost:8083}
          predicates:
            - Path=/uploads/**
        - id: inspire-recommend
          uri: ${routes.recommend-service:http://localhost:8084}
          predicates:
            - Path=/api/recommend/**
          filters:
            - StripPrefix=1
        - id: inspire-admin
          uri: ${routes.admin-service:http://localhost:8085}
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1

        - id: inspire-message
          uri: ${routes.core-service:http://localhost:8083}
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1

        # 搜索服务
        - id: inspire-search
          uri: ${routes.search-service:http://localhost:8086}
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1
        # 文件上传
        - id: inspire-file
          uri: ${routes.core-service:http://localhost:8083}
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1
        # 消息通知
        - id: inspire-notification
          uri: ${routes.core-service:http://localhost:8083}
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=1
        # Swagger UI（透传到 auth 服务）
        - id: inspire-swagger
          uri: ${routes.auth-service:http://localhost:8081}
          predicates:
            - Path=/swagger-ui/**,/v3/api-docs/**
inspire:
  jwt:
    # ====================================================================
    # JWT 密钥 —— 文档 4.1.2节 / 5.1节 安全规范
    # 生产环境通过 Docker 环境变量 INSPIRE_JWT_SECRET 注入
    # 开发环境可在 application-dev.yml 或 .env 中配置
    # 密钥要求：Base64 编码，≥32字节（256位），大小写+数字+特殊字符
    # ====================================================================
    secret: ${INSPIRE_JWT_SECRET:}

    # AccessToken 有效期（毫秒），文档规定 15分钟 = 900秒
    access-token-expiration: 900000

    # ====================================================================
    # 白名单路径 —— 文档 4.2.1 节
    # 无需登录即可访问，网关直接放行跳过所有鉴权
    # --------------------------------------------------------------------
    # 含以下分类：
    # 1. 登录          /api/auth/login
    # 2. 刷新令牌      /api/auth/refresh
    # 3. 登出          /api/auth/logout
    # 4. 静态资源      /uploads/**, /favicon.ico
    # 5. 健康检测      /actuator/health/**, /actuator/info
    # 6. 文档          /swagger-ui/**, /v3/api-docs/**
    # 7. 匿名公开接口   /api/inspire/public/**, /api/search/public/**, /api/admin/public/**
    # ====================================================================
    white-list: /api/auth/login,/api/auth/register,/api/auth/refresh,/api/auth/logout,/uploads/**,/favicon.ico,/actuator/health/**,/actuator/info,/swagger-ui/**,/v3/api-docs/**,/api/inspire/public/**,/api/search/public/**,/api/admin/public/**

logging:
  level:
    com.inspire: debug
    org.springframework.cloud.gateway: warn
