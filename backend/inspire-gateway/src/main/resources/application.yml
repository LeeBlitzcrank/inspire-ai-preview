server:
  port: 8080

spring:
  application:
    name: inspire-gateway
  profiles:
    active: dev
  main:
    web-application-type: reactive
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userKeyResolver}"
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            redis-rate-limiter.requestedTokens: 1
      routes:
        - id: inspire-auth
          uri: ${routes.auth-service:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: inspire-ai
          uri: ${routes.ai-service:http://localhost:8082}
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
        - id: inspire-core
          uri: ${routes.core-service:http://localhost:8083}
          predicates:
            - Path=/api/inspire/**
          filters:
            - StripPrefix=1
        - id: inspire-recommend
          uri: ${routes.recommend-service:http://localhost:8084}
          predicates:
            - Path=/api/recommend/**
          filters:
            - StripPrefix=1
        - id: inspire-admin
          uri: ${routes.admin-service:http://localhost:8085}
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
        # Swagger UI（透传到 auth 服务）
        - id: inspire-swagger
          uri: ${routes.auth-service:http://localhost:8081}
          predicates:
            - Path=/swagger-ui/**,/v3/api-docs/**
inspire:
  jwt:
    secret: dGhpc0lzQURlZmF1bHRTZWNyZXRLZXlGb3JMb2NhbERldk9ubHlQbGVhc2VSZXBsYWNlSW5Qcm9k
    expiration: 604800000
    white-list: /api/auth/login,/api/auth/register,/api/auth/forgot-password,/api/auth/reset-password,/api/inspire/public/**,/swagger-ui/**,/v3/api-docs/**

logging:
  level:
    com.inspire: info
    org.springframework.cloud.gateway: warn
