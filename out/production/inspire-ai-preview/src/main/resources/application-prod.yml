# =============================================
# 生产环境配置 - 中间件集群
# =============================================

server:
  port: 8080

spring:
  data:
    redis:
      sentinel:
        master: redis-sentinel-master
        nodes:
          - ${INSPIRE_REDIS_SENTINEL_HOST:localhost}:26379
      password: ${INSPIRE_REDIS_PASSWORD:Redis@Inspire2026}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # 生产数据库（MyBatis-Plus 多数据源：主库写入 + 从库查询）
  datasource:
    master:
      url: ${INSPIRE_DB_MASTER_URL:jdbc:mysql://localhost:3306/inspire_ai_preview?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai}
      username: ${INSPIRE_DB_USERNAME:inspire_rw}
      password: ${INSPIRE_DB_PASSWORD:Inspire@2026}
    slave1:
      url: ${INSPIRE_DB_SLAVE_URL:jdbc:mysql://localhost:3306/inspire_ai_preview?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai}
      username: ${INSPIRE_DB_USERNAME:inspire_rw}
      password: ${INSPIRE_DB_PASSWORD:Inspire@2026}

# 路由指向生产服务（K8s 或注册中心服务名）
routes:
  auth-service: http://inspire-auth:8081
  ai-service: http://inspire-ai:8082
  core-service: http://inspire-core:8083
  recommend-service: http://inspire-recommend:8084
  admin-service: http://inspire-admin:8085

# 生产日志
logging:
  level:
    com.inspire: info
    org.springframework.cloud.gateway: warn
