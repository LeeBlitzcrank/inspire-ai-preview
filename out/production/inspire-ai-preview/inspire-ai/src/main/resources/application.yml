server:
  port: 8082
spring:
  application:
    name: inspire-ai
  profiles:
    active: dev
inspire:
  ai:
    deepseek:
      api-key: ${INSPIRE_DEEPSEEK_API_KEY:}
      api-url: ${INSPIRE_DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
      model: deepseek-chat
logging:
  level:
    com.inspire: debug

redis:
  host: ${INSPIRE_REDIS_HOST:localhost}
  port: ${INSPIRE_REDIS_PORT:6379}
  password: ${INSPIRE_REDIS_PASSWORD:123456}
