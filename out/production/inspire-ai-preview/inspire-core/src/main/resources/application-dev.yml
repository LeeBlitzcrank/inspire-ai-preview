spring:
  datasource:
    url: jdbc:mysql://localhost:3306/inspire_ai_preview?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectionTimeZone=%2B08:00&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: ${INSPIRE_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 3000
      max-lifetime: 1800000
logging:
  level:
    com.inspire: debug

# ES 同步配置（留空则不启用，不影响核心功能）
inspire:
  es:
    hosts: ${INSPIRE_ES_HOSTS:localhost:9200}

# Unsplash API 配置（注册获取 Access Key: https://unsplash.com/developers）
  unsplash:
    access-key: ${INSPIRE_UNSPLASH_ACCESS_KEY:}


